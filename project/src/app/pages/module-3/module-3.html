<main class="study-module study-module--3">
  <section class="study-module__top study-module__top--module-3">
    <div class="study-module__module-tag"><span>3 МОДУЛЬ</span></div>
    <div class="study-module__title"><span>“ГОТОВИМ ВМЕСТЕ”</span></div>
  </section>

  <div id="text-slot-module-3" class="study-module__speech" data-slot="TEXT_SLOT_MODULE_3"></div>

  <img class="study-module__character study-module__character--left" src="/assets/modules/p3.png" alt="" aria-hidden="true" />

    <section class="activity-panel" aria-label="Материалы модуля">
    <input #videoToggle class="video-toggle" type="checkbox" id="video-toggle" (change)="videoToggle.checked || pauseVideo(moduleVideo)">

    <div class="video-frame">
      <video
        #moduleVideo
        class="module-video"
        src="/assets/video/model_2.MOV"
        [controls]="videoToggle.checked"
        playsinline
        preload="auto"
        (play)="isVideoPlaying = true"
        (pause)="isVideoPlaying = false"
        (ended)="isVideoPlaying = false"
      >
        Your browser does not support video playback.
      </video>

      <button
        class="video-click-layer"
        [class.video-click-layer--active]="videoToggle.checked"
        type="button"
        aria-label="Переключить видео"
        (click)="toggleVideoPlayback(moduleVideo, $event)"
      ></button>

      <button
        class="play-button"
        [class.play-button--hidden]="videoToggle.checked && isVideoPlaying"
        type="button"
        aria-label="Открыть видео"
        (click)="openAndPlayVideo(videoToggle, moduleVideo, $event)"
      ></button>

      <div class="video-overlay">
        <label class="close-video" for="video-toggle" aria-label="Закрыть видео">×</label>
      </div>
    </div>

    <nav class="actions" aria-label="Разделы модуля">
      <a class="button-link" >Вопросы</a>
      <a class="button-link" >Сообщество в VK</a>
    </nav>

    <a class="next-link" routerLink="/module-4">Далее</a>
  </section>
</main>
