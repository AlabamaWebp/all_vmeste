<main class="study-module study-module--2">
  <button class="study-module__back" type="button" routerLink="/module-1">&lt; Назад</button>

  <section class="study-module__top study-module__top--module-2">
    <div class="study-module__module-tag">2 МОДУЛЬ</div>
    <div class="study-module__title">“СДЕЛАЕМ ВМЕСТЕ”</div>
  </section>

  <!-- TEXT_SLOT_MODULE_2: сюда вставляется текст диалога -->
  <div class="study-module__speech study-module__speech--right"></div>

  <img class="study-module__character study-module__character--right" src="/assets/modules/p2.png" alt="" aria-hidden="true" />

  <section class="study-module__panel study-module__panel--left">
    <!-- VIDEO_SLOT_MODULE_2: сюда вставляется видеоплеер -->
    <div class="study-module__video-slot">
      <button class="study-module__play" type="button" aria-label="Воспроизвести видео">
        <span class="study-module__play-icon"></span>
      </button>
    </div>

    <div class="study-module__actions">
      <button class="study-module__action" type="button">Вопросы</button>
      <button class="study-module__action" type="button">Практическое задание</button>
    </div>

    <button class="study-module__next" type="button" routerLink="/module-3">Далее &gt;</button>
  </section>
</main>
