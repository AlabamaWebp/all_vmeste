<main class="study-module study-module--1">
  <button class="study-module__back" type="button" routerLink="/">&lt; Назад</button>

  <section class="study-module__top">
    <div class="study-module__module-tag">1 МОДУЛЬ</div>
    <div class="study-module__title">“ЛИТЕРАТУРНЫЙ”</div>
  </section>

  <section class="study-module__middle">
    <img class="study-module__character study-module__character--left" src="/assets/modules/p1.png" alt="" aria-hidden="true" />

    <!-- TEXT_SLOT_MODULE_1: сюда вставляется текст диалога -->
    <div class="study-module__speech"></div>
  </section>

  <section class="study-module__panel study-module__panel--right">
    <!-- VIDEO_SLOT_MODULE_1: сюда вставляется видеоплеер -->
    <div class="study-module__video-slot">
      <button class="study-module__play" type="button" aria-label="Воспроизвести видео">
        <span class="study-module__play-icon"></span>
      </button>
    </div>

    <div class="study-module__actions">
      <button class="study-module__action" type="button">Тест</button>
      <button class="study-module__action" type="button">Практическое задание</button>
      <button class="study-module__action" type="button">Сказка</button>
    </div>

    <button class="study-module__next" type="button" routerLink="/module-2">Далее &gt;</button>
  </section>
</main>
