<main class="story-page" aria-label="Сказки народов России">
  @for (slide of slides; track slide.title) {
    <section class="story-slide" [style.background-image]="'url(' + slide.background + ')'">
      <div class="story-slide__shade" aria-hidden="true"></div>
      <div class="story-slide__pattern" aria-hidden="true">
        <span></span>
        <span></span>
      </div>

      <div class="story-slide__content">
        <p class="story-slide__title">“{{ slide.title }}”</p>
        <p class="story-slide__region">{{ slide.region }}</p>
        <p class="story-slide__description">{{ slide.description }}</p>
        <button class="story-slide__button" type="button">{{ slide.action }}</button>
      </div>

      <img class="story-slide__character" [src]="slide.character" alt="Сереброзубая Пампалче" />
    </section>
  }
</main>
